version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fee_schedule_prod_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fee_schedule_db
    ports:
      - "5432:5432"
    volumes:
      - prod_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fee_schedule_prod_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - HOST=0.0.0.0
      - DATABASE_URL=postgres://postgres:password@db:5432/fee_schedule_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fee_schedule_prod_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  prod_pgdata:
    driver: local
